services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mine_sweeper_world_dev
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    command: ["mix", "phx.server"]
    environment:
      DATABASE_HOST: db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: mine_sweeper_world_dev
      PHX_BIND_ALL: "true"
      MIX_ENV: dev
    ports:
      - 4000:4000
    volumes:
      # Bind-mount the source for live reload...
      - .:/app
      # ...but keep build artifacts/deps on container-local named volumes so
      # the Linux container never clashes with host (macOS) artifacts.
      - build:/app/_build
      - deps:/app/deps
      - static:/app/priv/static
      - node_modules:/app/assets/node_modules
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  build:
  deps:
  static:
  node_modules:
